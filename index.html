<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Markdown Review</title>
    <script>
      (() => {
        const key = "markdown-review-layout-mode";
        const mode = localStorage.getItem(key);
        if (mode === "editor" || mode === "preview" || mode === "split") {
          document.documentElement.setAttribute("data-layout-mode", mode);
        }
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="./public/assets/favicon.svg" />
    <link rel="shortcut icon" href="./public/assets/favicon.svg" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1>Markdown Review</h1>
        <p>GitHub 风格在线预览</p>
      </div>
      <div class="actions">
        <button id="themeBtn" type="button">夜间模式</button>
        <button id="sampleBtn" type="button">示例</button>
        <button id="copyBtn" type="button">复制 Markdown</button>
        <button id="clearBtn" type="button">清空</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel" id="editorPanel">
        <div class="panel-title">
          <span>编辑区</span>
          <span id="inputMeta">0 chars</span>
        </div>
        <textarea id="editor" spellcheck="false" aria-label="Markdown 输入"></textarea>
      </section>

      <button class="splitter" id="splitterControls" type="button" aria-label="切换分栏模式" title="点击切换模式；拖拽可调整比例">
        <span class="splitter-dot" aria-hidden="true"></span>
      </button>

      <section class="panel" id="previewPanel">
        <div class="panel-title">
          <span>预览区（GFM）</span>
          <span id="statusBadge" class="status-badge">初始化</span>
        </div>
        <article id="preview" class="markdown-body"></article>
      </section>
    </main>

    <script src="./bootstrap.js"></script>
  </body>
</html>
